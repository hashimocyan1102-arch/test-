<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simple Room Map</title>
<style>
body { margin:0; background:black; }
canvas { width:100vw; height:100vh; display:block; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// カメラ
const video = document.createElement("video");
video.setAttribute("playsinline", true);

// ワールド
const SIZE = 300;
let world = Array.from({length: SIZE}, () => Array(SIZE).fill(0));

// カメラ位置
let cam = { x: SIZE/2, y: SIZE/2 };

// 前フレーム
let prev = null;

// カメラ起動（前面固定）
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  video.srcObject = stream;

  video.onloadedmetadata = () => {
    video.play();
    loop();
  };
})
.catch(e => alert(e));

// 動き検出
function detect(frame, prev) {
  for (let i = 0; i < frame.data.length; i += 60) {
    let diff = Math.abs(frame.data[i] - prev.data[i]);

    if (diff > 20) {
      let x = (i/4) % canvas.width;
      let y = Math.floor((i/4)/canvas.width);

      write(x, y);
    }
  }
}

// ワールドに書く
function write(x, y) {
  let wx = Math.floor(cam.x + (x - canvas.width/2) / 10);
  let wy = Math.floor(cam.y + (y - canvas.height/2) / 10);

  if (wx>=0 && wx<SIZE && wy>=0 && wy<SIZE) {
    world[wx][wy] += 1;
  }
}

// マップ描画
function drawMap() {
  for (let x=0; x<SIZE; x++) {
    for (let y=0; y<SIZE; y++) {
      if (world[x][y] > 0) {
        ctx.fillStyle = "white";
        ctx.fillRect(x, y, 2, 2);
      }
    }
  }

  // 自分位置
  ctx.fillStyle = "red";
  ctx.fillRect(cam.x, cam.y, 4, 4);
}

// メインループ
function loop() {
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  let frame = ctx.getImageData(0,0,canvas.width,canvas.height);

  if (prev) detect(frame, prev);
  prev = frame;

  // マップ表示
  ctx.save();
  ctx.scale(2,2);
  drawMap();
  ctx.restore();

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
