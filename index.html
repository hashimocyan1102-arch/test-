<!DOCTYPE html>
<html>
<body style="margin:0; background:black;">

<video id="v" autoplay playsinline muted
style="position:absolute;width:100vw;height:100vh;object-fit:cover;"></video>

<canvas id="c"
style="position:absolute;top:0;left:0;"></canvas>

<script>
const v = document.getElementById("v");
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

// カメラ
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  v.srcObject = stream;
  v.onloadedmetadata = () => {
    v.play();
    loop();
  };
})
.catch(e => alert(e));

// マップ
const SIZE = 200;
let world = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
let cam = { x: SIZE/2, y: SIZE/2 };

let prev = null;

// 動き検出
function detect(frame, prev) {
  for (let i = 0; i < frame.data.length; i += 80) {
    let diff = Math.abs(frame.data[i] - prev.data[i]);

    if (diff > 15) {
      let x = (i/4) % c.width;
      let y = Math.floor((i/4)/c.width);

      let wx = Math.floor(cam.x + (x - c.width/2) / 20);
      let wy = Math.floor(cam.y + (y - c.height/2) / 20);

      if (wx>=0 && wx<SIZE && wy>=0 && wy<SIZE) {
        world[wx][wy] += 1;
      }
    }
  }
}

// 描画
function drawMap() {
  for (let x=0; x<SIZE; x++) {
    for (let y=0; y<SIZE; y++) {
      if (world[x][y] > 0) {
        ctx.fillStyle = "red";
        ctx.fillRect(x*2, y*2, 2, 2);
      }
    }
  }

  // 自分
  ctx.fillStyle = "blue";
  ctx.fillRect(cam.x*2, cam.y*2, 4, 4);
}

// ループ
function loop() {
  if (v.videoWidth === 0) {
    requestAnimationFrame(loop);
    return;
  }

  ctx.drawImage(v, 0, 0, c.width, c.height);
  let frame = ctx.getImageData(0,0,c.width,c.height);

  if (prev) detect(frame, prev);
  prev = frame;

  drawMap();

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
